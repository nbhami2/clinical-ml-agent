name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        shell: pwsh
        run: |
          irm https://astral.sh/uv/install.ps1 | iex
          echo "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install deps
        shell: pwsh
        run: |
          uv sync --dev

      - name: Lint
        shell: pwsh
        run: |
          uv run ruff check .

      - name: Tests
        shell: pwsh
        run: |
          uv run pytest